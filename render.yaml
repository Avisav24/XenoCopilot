services:
  - type: web
    name: xenocopilot-backend
    env: node
    buildCommand: pnpm install --production=false && pnpm --filter @xenocopilot/shared-types build && pnpm --filter @xenocopilot/backend db:generate && pnpm --filter @xenocopilot/backend build
    startCommand: pnpm --filter @xenocopilot/backend start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_KEY_1
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: GEMINI_API_KEY_3
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
